name: Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1: Basic smoke test – Dockerfile.trixie (no extras)
  # Validates: Chrome, Firefox, SeleniumBase, browser drivers
  # ============================================================
  trixie-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Trixie image (base)
      run: |
        docker build -f Dockerfile.trixie \
          --load \
          -t rpa-worker-trixie:base .

    - name: Create data directory
      run: mkdir -p data && chmod 777 data

    - name: Run smoke test in container
      run: |
        docker run --rm \
          -e TARGET_URL=https://example.com \
          -e CACHE_DIR=/data \
          -v $(pwd)/data:/data \
          rpa-worker-trixie:base \
          python /app/smoke_test.py

    - name: Run browser WebDriver tests in container
      run: |
        docker run --rm \
          -e CACHE_DIR=/data \
          -v $(pwd)/data:/data \
          rpa-worker-trixie:base \
          python /app/test_browser_drivers.py

    - name: Upload smoke test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trixie-smoke-test-results
        path: data/
        retention-days: 7

  # ============================================================
  # Job 2: PJeOffice test – Dockerfile.trixie with BUILD_PJEOFFICE=1
  # Validates: Xvfb, OpenBox, PJeOffice startup and processes
  # ============================================================
  trixie-pjeoffice-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Trixie image with PJeOffice
      run: |
        docker build -f Dockerfile.trixie \
          --build-arg BUILD_PJEOFFICE=1 \
          --load \
          -t rpa-worker-trixie:pjeoffice .

    - name: Create data directory
      run: mkdir -p data && chmod 777 data

    - name: Run smoke test with Xvfb and PJeOffice
      run: |
        docker run --rm \
          -e USE_XVFB=1 \
          -e USE_OPENBOX=1 \
          -e USE_PJEOFFICE=1 \
          -e CHECK_PROCESSES=1 \
          -e TARGET_URL=https://example.com \
          -e CACHE_DIR=/data \
          -v $(pwd)/data:/data \
          rpa-worker-trixie:pjeoffice \
          bash -c "sleep 5 && python /app/smoke_test.py"

    - name: Verify processes in container
      run: |
        docker run --rm \
          -e USE_XVFB=1 \
          -e USE_OPENBOX=1 \
          -e USE_PJEOFFICE=1 \
          rpa-worker-trixie:pjeoffice \
          bash -c "sleep 5 && pgrep -f Xvfb && pgrep -f pjeoffice && echo 'All processes running'"

    - name: Upload PJeOffice test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trixie-pjeoffice-test-results
        path: data/
        retention-days: 7

  # ============================================================
  # Job 3: noVNC test – Dockerfile.trixie with ENABLE_VNC=1 and ENABLE_NOVNC=1
  # Validates: Xvfb, x11vnc, websockify (noVNC) startup and processes
  # ============================================================
  trixie-novnc-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Trixie image with VNC and noVNC
      run: |
        docker build -f Dockerfile.trixie \
          --build-arg ENABLE_VNC=1 \
          --build-arg ENABLE_NOVNC=1 \
          --load \
          -t rpa-worker-trixie:novnc .

    - name: Create data directory
      run: mkdir -p data && chmod 777 data

    - name: Run smoke test with noVNC enabled
      run: |
        docker run --rm \
          -e USE_XVFB=1 \
          -e USE_VNC=1 \
          -e USE_NOVNC=1 \
          -e CHECK_PROCESSES=1 \
          -e TARGET_URL=https://example.com \
          -e CACHE_DIR=/data \
          -v $(pwd)/data:/data \
          rpa-worker-trixie:novnc \
          bash -c "sleep 5 && python /app/smoke_test.py"

    - name: Verify noVNC processes in container
      run: |
        docker run --rm \
          -e USE_XVFB=1 \
          -e USE_VNC=1 \
          -e USE_NOVNC=1 \
          rpa-worker-trixie:novnc \
          bash -c "sleep 5 && pgrep -f Xvfb && pgrep -f x11vnc && pgrep -f websockify && echo 'All noVNC processes running'"

    - name: Upload noVNC test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trixie-novnc-test-results
        path: data/
        retention-days: 7

  # ============================================================
  # Job 4: Screen recording test – Dockerfile.trixie with ENABLE_FFMPEG=1
  # Validates: Xvfb, FFmpeg screen recording, recording file creation
  # ============================================================
  trixie-screen-recording-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Trixie image with FFmpeg
      run: |
        docker build -f Dockerfile.trixie \
          --build-arg ENABLE_FFMPEG=1 \
          --load \
          -t rpa-worker-trixie:ffmpeg .

    - name: Create directories
      run: |
        mkdir -p data recordings
        chmod 777 data recordings

    - name: Run smoke test with screen recording
      run: |
        docker run --rm \
          -e USE_XVFB=1 \
          -e USE_SCREEN_RECORDING=1 \
          -e CHECK_PROCESSES=1 \
          -e TARGET_URL=https://example.com \
          -e CACHE_DIR=/data \
          -e RECORDING_DIR=/recordings \
          -v $(pwd)/data:/data \
          -v $(pwd)/recordings:/recordings \
          rpa-worker-trixie:ffmpeg \
          bash -c "sleep 5 && python /app/smoke_test.py && sleep 2"

    - name: Verify recording file exists
      run: |
        if [ -z "$(ls -A recordings/*.mp4 2>/dev/null)" ]; then
          echo "Error: No recording file found in ./recordings/"
          echo "Check that ENABLE_FFMPEG=1 was used at build time and USE_SCREEN_RECORDING=1 at runtime."
          ls -lh recordings/ 2>/dev/null || echo "recordings/ directory is empty or inaccessible"
          exit 1
        fi
        echo "Recording file(s) found:"
        ls -lh recordings/*.mp4

    - name: Upload screen recording artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trixie-screen-recording-test-results
        path: |
          data/
          recordings/
        retention-days: 7

  # ============================================================
  # Job 5: Full integration test – Dockerfile.trixie with all features
  # Validates: Python packages, PDF tools, A1 certs, display, browsers
  # ============================================================
  trixie-integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Trixie image with full dependencies
      run: |
        docker build -f Dockerfile.trixie \
          --build-arg BUILD_PJEOFFICE=1 \
          --build-arg ENABLE_PDF_TOOLS=1 \
          --load \
          -t rpa-worker-trixie:full .

    - name: Log browser and Python versions
      run: |
        docker run --rm rpa-worker-trixie:full bash -c "
          echo '=== System Information ===' && \
          python --version && \
          chrome --version && \
          firefox --version && \
          chromedriver --version && \
          geckodriver --version && \
          openssl version && \
          echo '=== Key Package Versions ===' && \
          pip show pytest selenium seleniumbase pillow opencv-python reportlab PyMuPDF endesive cryptography | grep -E '^(Name|Version):' && \
          echo '=== Verify oscrypto is NOT installed ===' && \
          (pip show oscrypto && echo 'ERROR: oscrypto found!' && exit 1) || echo 'OK: oscrypto not installed'
        "

    - name: Create test directories
      run: |
        mkdir -p data test-results
        chmod 777 data test-results

    - name: Run integration tests (no display)
      run: |
        docker run --rm \
          -e CACHE_DIR=/data \
          -v $(pwd)/data:/data \
          -v $(pwd)/test-results:/test-results \
          rpa-worker-trixie:full \
          bash -c "pytest -v --timeout=180 --junitxml=/test-results/junit-no-display.xml -m 'trixie and integration and not requires_display' tests/trixie_integration_test.py || exit 0"

    - name: Run integration tests (with Xvfb)
      run: |
        docker run --rm \
          -e USE_XVFB=1 \
          -e DISPLAY=:99 \
          -e CACHE_DIR=/data \
          -v $(pwd)/data:/data \
          -v $(pwd)/test-results:/test-results \
          rpa-worker-trixie:full \
          bash -c "sleep 3 && pytest -v --timeout=180 --junitxml=/test-results/junit-xvfb.xml -m 'trixie and integration' tests/trixie_integration_test.py::TestDisplay || exit 0"

    - name: Run integration tests (with Xvfb + Openbox)
      run: |
        docker run --rm \
          -e USE_XVFB=1 \
          -e USE_OPENBOX=1 \
          -e DISPLAY=:99 \
          -e CACHE_DIR=/data \
          -v $(pwd)/data:/data \
          -v $(pwd)/test-results:/test-results \
          rpa-worker-trixie:full \
          bash -c "sleep 5 && pytest -v --timeout=180 --junitxml=/test-results/junit-full.xml -m 'trixie and integration' tests/trixie_integration_test.py || exit 0"

    - name: Display test results summary
      if: always()
      run: |
        echo "=== Test Results Summary ==="
        for file in test-results/*.xml; do
          if [ -f "$file" ]; then
            echo "File: $(basename $file)"
            grep -oP 'tests="\K[0-9]+' "$file" | head -1 | xargs -I {} echo "  Tests: {}"
            grep -oP 'failures="\K[0-9]+' "$file" | head -1 | xargs -I {} echo "  Failures: {}"
            grep -oP 'errors="\K[0-9]+' "$file" | head -1 | xargs -I {} echo "  Errors: {}"
            grep -oP 'skipped="\K[0-9]+' "$file" | head -1 | xargs -I {} echo "  Skipped: {}"
          fi
        done

    - name: Upload integration test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trixie-integration-test-results
        path: |
          test-results/
          data/
        retention-days: 7
